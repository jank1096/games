<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .games {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            max-width: 800px;
            margin: 0 auto;
        }
        a.card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem 1rem;
            text-decoration: none;
            color: #fff;
            transition: transform 0.15s, border-color 0.15s;
        }
        a.card:hover, a.card:active {
            transform: scale(1.03);
            border-color: #fff;
        }
        .emoji {
            font-size: 2.2rem;
            margin-bottom: 0.6rem;
        }
        .name {
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
        }
        .nr {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
    <h1>Browser Games</h1>
    <p class="subtitle">10 Spiele in reinem HTML, CSS & JavaScript</p>
    <div class="games">
        <a class="card" href="01-zahlenraten/">
            <div class="emoji">🔢</div>
            <div class="name">Zahlenraten</div>
            <div class="nr">#01</div>
        </a>
        <a class="card" href="02-stein-schere-papier/">
            <div class="emoji">✊</div>
            <div class="name">Stein Schere Papier</div>
            <div class="nr">#02</div>
        </a>
        <a class="card" href="03-vier-gewinnt/">
            <div class="emoji">🔴</div>
            <div class="name">Vier Gewinnt</div>
            <div class="nr">#03</div>
        </a>
        <a class="card" href="04-tic-tac-toe/">
            <div class="emoji">❌</div>
            <div class="name">Tic-Tac-Toe</div>
            <div class="nr">#04</div>
        </a>
        <a class="card" href="05-dame/">
            <div class="emoji">🏁</div>
            <div class="name">Dame</div>
            <div class="nr">#05</div>
        </a>
        <a class="card" href="06-snake/">
            <div class="emoji">🐍</div>
            <div class="name">Snake</div>
            <div class="nr">#06</div>
        </a>
        <a class="card" href="07-pong/">
            <div class="emoji">🏓</div>
            <div class="name">Pong</div>
            <div class="nr">#07</div>
        </a>
        <a class="card" href="08-breakout/">
            <div class="emoji">🧱</div>
            <div class="name">Breakout</div>
            <div class="nr">#08</div>
        </a>
        <a class="card" href="09-flappy-bird/">
            <div class="emoji">🐦</div>
            <div class="name">Flappy Bird</div>
            <div class="nr">#09</div>
        </a>
        <a class="card" href="10-schach/">
            <div class="emoji">♟️</div>
            <div class="name">Schach</div>
            <div class="nr">#10</div>
        </a>
    </div>
</body>
</html>
