<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Coin Flip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Coin Flip</h1>
        <p class="subtitle">Tap the coin to flip</p>

        <div class="coin-wrapper">
            <div class="coin" id="coin">
                <div class="coin-face coin-heads">H</div>
                <div class="coin-face coin-tails">T</div>
            </div>
        </div>

        <div class="result" id="result"></div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="headsCount">0</div>
                <div class="stat-label">Heads</div>
            </div>
            <div class="stat">
                <div class="stat-divider"></div>
            </div>
            <div class="stat">
                <div class="stat-value" id="tailsCount">0</div>
                <div class="stat-label">Tails</div>
            </div>
        </div>

        <div class="stats secondary">
            <div class="stat">
                <div class="stat-value small" id="totalFlips">0</div>
                <div class="stat-label">Total Flips</div>
            </div>
            <div class="stat">
                <div class="stat-value small" id="streak">0</div>
                <div class="stat-label">Current Streak</div>
            </div>
        </div>

        <button class="reset-btn" id="resetBtn">Reset</button>

        <a class="back-link" href="../">Back to Arcade</a>
    </div>
    <script src="game.js"></script>
</body>
</html>
